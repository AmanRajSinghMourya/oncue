name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build and test
        run: |
          xcodebuild \
            -project OnCue.xcodeproj \
            -scheme OnCue \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test
